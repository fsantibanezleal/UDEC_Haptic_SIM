<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="backendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d1f0e"/>
      <stop offset="100%" stop-color="#1a1208"/>
    </linearGradient>
    <linearGradient id="frontendGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e2d2a"/>
      <stop offset="100%" stop-color="#081a18"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#39d2c0"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d29922"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="18" font-weight="bold">UDEC Haptic SIM - System Architecture</text>
  <text x="450" y="55" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="12">FastAPI Backend + Three.js Frontend with WebSocket Communication</text>

  <!-- Backend Box -->
  <rect x="30" y="80" width="380" height="380" rx="12" fill="url(#backendGrad)" stroke="#d29922" stroke-width="2"/>
  <text x="220" y="108" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="15" font-weight="bold">FastAPI Backend (Python)</text>
  <text x="220" y="124" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Port 8006 | uvicorn ASGI</text>

  <!-- Backend modules -->
  <!-- Scene Manager -->
  <rect x="50" y="140" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="130" y="164" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Scene Manager</text>
  <text x="130" y="180" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Bodies, Probe, State</text>
  <text x="130" y="192" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">scene.py</text>

  <!-- Octree -->
  <rect x="230" y="140" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="310" y="164" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Octree Engine</text>
  <text x="310" y="180" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Spatial Partitioning</text>
  <text x="310" y="192" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">collision.py</text>

  <!-- Physics -->
  <rect x="50" y="220" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="130" y="244" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Physics Engine</text>
  <text x="130" y="260" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Spring Force Model</text>
  <text x="130" y="272" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">physics.py</text>

  <!-- OBJ Loader -->
  <rect x="230" y="220" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="310" y="244" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">OBJ Loader</text>
  <text x="310" y="260" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Wavefront Parser</text>
  <text x="310" y="272" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">obj_loader.py</text>

  <!-- Rigid Body -->
  <rect x="50" y="300" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="130" y="324" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Rigid Body</text>
  <text x="130" y="340" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Mesh, Normals, AABB</text>
  <text x="130" y="352" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">rigid_body.py</text>

  <!-- Transform -->
  <rect x="230" y="300" width="160" height="60" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="310" y="324" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Transforms</text>
  <text x="310" y="340" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Rodrigues, Quaternions</text>
  <text x="310" y="352" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">transform.py</text>

  <!-- API Routes -->
  <rect x="100" y="380" width="240" height="45" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1.2"/>
  <text x="220" y="400" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">API Routes + WebSocket Handler</text>
  <text x="220" y="416" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">REST: /api/* | WS: /ws | routes.py</text>

  <!-- Frontend Box -->
  <rect x="490" y="80" width="380" height="380" rx="12" fill="url(#frontendGrad)" stroke="#39d2c0" stroke-width="2"/>
  <text x="680" y="108" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="15" font-weight="bold">Three.js Frontend (Browser)</text>
  <text x="680" y="124" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">HTML5 Canvas | WebGL</text>

  <!-- Frontend modules -->
  <!-- 3D Renderer -->
  <rect x="510" y="140" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="590" y="164" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">3D Renderer</text>
  <text x="590" y="180" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Mesh + Wireframe</text>
  <text x="590" y="192" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">renderer3d.js</text>

  <!-- Force Visualiser -->
  <rect x="690" y="140" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="770" y="164" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Force Visualiser</text>
  <text x="770" y="180" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Arrow + Spring Line</text>
  <text x="770" y="192" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">renderer3d.js</text>

  <!-- Probe Controller -->
  <rect x="510" y="220" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="590" y="244" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Probe Controller</text>
  <text x="590" y="260" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Slider / Click Input</text>
  <text x="590" y="272" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">controls.js</text>

  <!-- UI Controls -->
  <rect x="690" y="220" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="770" y="244" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">UI Controls</text>
  <text x="770" y="260" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Params, Toggles</text>
  <text x="770" y="272" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">controls.js</text>

  <!-- Octree Viz -->
  <rect x="510" y="300" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="590" y="324" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">Octree Overlay</text>
  <text x="590" y="340" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Wireframe Boxes</text>
  <text x="590" y="352" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">renderer3d.js</text>

  <!-- WebSocket Client -->
  <rect x="690" y="300" width="160" height="60" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="770" y="324" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">WebSocket Client</text>
  <text x="770" y="340" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Auto-reconnect</text>
  <text x="770" y="352" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">websocket.js</text>

  <!-- Camera -->
  <rect x="580" y="380" width="200" height="45" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1.2"/>
  <text x="680" y="400" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="12" font-weight="bold">OrbitControls Camera</text>
  <text x="680" y="416" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Orbit, Zoom, Pan</text>

  <!-- WebSocket Arrows -->
  <!-- State updates: Backend -> Frontend -->
  <line x1="410" y1="210" x2="490" y2="170" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arrowGreen)" filter="url(#glow)"/>
  <text x="450" y="178" text-anchor="middle" fill="#3fb950" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Scene State</text>

  <!-- Probe position: Frontend -> Backend -->
  <line x1="490" y1="250" x2="410" y2="250" stroke="#39d2c0" stroke-width="2.5" marker-end="url(#arrowCyan)" filter="url(#glow)"/>
  <text x="450" y="242" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Probe XYZ</text>

  <!-- Force vectors -->
  <line x1="410" y1="290" x2="490" y2="310" stroke="#d29922" stroke-width="2.5" marker-end="url(#arrowOrange)" filter="url(#glow)"/>
  <text x="450" y="312" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Force Vector</text>

  <!-- Settings -->
  <line x1="490" y1="340" x2="410" y2="370" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>
  <text x="450" y="366" text-anchor="middle" fill="#3fb950" font-family="Arial, sans-serif" font-size="8">Settings / Transforms</text>

  <!-- WebSocket Label -->
  <rect x="430" y="430" width="40" height="24" rx="4" fill="#21262d" stroke="#bc8cff" stroke-width="1"/>
  <text x="450" y="446" text-anchor="middle" fill="#bc8cff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">WS</text>

  <!-- Legend -->
  <rect x="20" y="470" width="860" height="22" rx="4" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <circle cx="50" cy="481" r="5" fill="#d29922"/>
  <text x="62" y="485" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Backend</text>
  <circle cx="140" cy="481" r="5" fill="#39d2c0"/>
  <text x="152" y="485" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Frontend</text>
  <line x1="220" y1="481" x2="250" y2="481" stroke="#3fb950" stroke-width="2"/>
  <text x="258" y="485" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Data Flow</text>
  <rect x="340" y="475" width="30" height="12" rx="2" fill="none" stroke="#bc8cff" stroke-width="1"/>
  <text x="378" y="485" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">WebSocket</text>
</svg>
