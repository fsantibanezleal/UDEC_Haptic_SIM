<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <linearGradient id="bgG5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <clipPath id="vpClip">
      <rect x="0" y="40" width="610" height="420"/>
    </clipPath>
  </defs>

  <rect width="900" height="500" fill="url(#bgG5)"/>

  <!-- ===== Header Bar ===== -->
  <rect x="0" y="0" width="900" height="40" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="18" y="26" fill="#39d2c0" font-family="Arial, sans-serif" font-size="15" font-weight="bold">UDEC Haptic SIM</text>
  <text x="180" y="26" fill="#8b949e" font-family="Arial, sans-serif" font-size="11">3D Haptic Simulation &amp; Collision Detection</text>
  <circle cx="872" cy="20" r="12" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="872" y="25" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="14">?</text>

  <!-- ===== 3D Viewport ===== -->
  <rect x="0" y="40" width="610" height="420" fill="#000"/>

  <!-- Grid lines -->
  <g opacity="0.2" stroke="#30363d" stroke-width="0.5">
    <line x1="0" y1="360" x2="610" y2="360"/>
    <line x1="50" y1="340" x2="560" y2="340"/>
    <line x1="100" y1="320" x2="510" y2="320"/>
    <line x1="0" y1="360" x2="305" y2="280"/>
    <line x1="610" y1="360" x2="305" y2="280"/>
    <line x1="122" y1="360" x2="244" y2="280"/>
    <line x1="244" y1="360" x2="273" y2="280"/>
    <line x1="366" y1="360" x2="336" y2="280"/>
    <line x1="488" y1="360" x2="367" y2="280"/>
  </g>

  <!-- Axes -->
  <line x1="50" y1="400" x2="100" y2="400" stroke="#f85149" stroke-width="2"/>
  <text x="105" y="403" fill="#f85149" font-family="Arial, sans-serif" font-size="9">X</text>
  <line x1="50" y1="400" x2="50" y2="355" stroke="#3fb950" stroke-width="2"/>
  <text x="45" y="352" fill="#3fb950" font-family="Arial, sans-serif" font-size="9">Y</text>
  <line x1="50" y1="400" x2="30" y2="415" stroke="#58a6ff" stroke-width="2"/>
  <text x="22" y="422" fill="#58a6ff" font-family="Arial, sans-serif" font-size="9">Z</text>

  <!-- Cube A (blue) -->
  <g>
    <!-- Front face -->
    <polygon points="160,240 260,240 260,340 160,340" fill="#3050a0" fill-opacity="0.6" stroke="#5080d0" stroke-width="1.5"/>
    <!-- Top face -->
    <polygon points="160,240 200,210 300,210 260,240" fill="#4060b0" fill-opacity="0.5" stroke="#5080d0" stroke-width="1"/>
    <!-- Right face -->
    <polygon points="260,240 300,210 300,310 260,340" fill="#2040a0" fill-opacity="0.5" stroke="#5080d0" stroke-width="1"/>
    <!-- Label -->
    <text x="210" y="300" text-anchor="middle" fill="#8bb8ff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Cube A</text>
  </g>

  <!-- Cube B (orange) with collision faces in red -->
  <g>
    <!-- Front face -->
    <polygon points="230,250 330,250 330,350 230,350" fill="#a05030" fill-opacity="0.6" stroke="#d07040" stroke-width="1.5"/>
    <!-- Top face -->
    <polygon points="230,250 270,220 370,220 330,250" fill="#b06040" fill-opacity="0.5" stroke="#d07040" stroke-width="1"/>
    <!-- Right face -->
    <polygon points="330,250 370,220 370,320 330,350" fill="#904020" fill-opacity="0.5" stroke="#d07040" stroke-width="1"/>
    <!-- Collision faces (red overlay on overlapping region) -->
    <polygon points="230,250 260,250 260,340 230,340" fill="#ff3333" fill-opacity="0.35" stroke="#ff4444" stroke-width="1.5"/>
    <polygon points="230,250 250,235 260,240 260,250" fill="#ff3333" fill-opacity="0.3" stroke="#ff4444" stroke-width="1"/>
    <!-- Label -->
    <text x="300" y="310" text-anchor="middle" fill="#ffb088" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Cube B</text>
  </g>

  <!-- Sphere (green) -->
  <circle cx="290" cy="150" r="45" fill="#306030" fill-opacity="0.6" stroke="#40a040" stroke-width="1.5"/>
  <!-- Sphere wireframe hints -->
  <ellipse cx="290" cy="150" rx="45" ry="12" fill="none" stroke="#40a040" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="290" cy="150" rx="12" ry="45" fill="none" stroke="#40a040" stroke-width="0.5" opacity="0.4"/>
  <text x="290" y="155" text-anchor="middle" fill="#80d080" font-family="Arial, sans-serif" font-size="10" font-weight="bold">Sphere</text>

  <!-- Octree wireframes (semi-transparent) -->
  <g opacity="0.25" stroke="#d29922" fill="none" stroke-width="0.8">
    <rect x="130" y="120" width="250" height="250"/>
    <rect x="130" y="120" width="125" height="125"/>
    <rect x="255" y="120" width="125" height="125"/>
    <rect x="130" y="245" width="125" height="125"/>
    <rect x="255" y="245" width="125" height="125"/>
    <!-- Deeper subdivisions -->
    <rect x="130" y="245" width="62" height="62"/>
    <rect x="192" y="245" width="63" height="62"/>
    <rect x="255" y="245" width="62" height="62"/>
  </g>

  <!-- Probe cursor (yellow sphere) -->
  <circle cx="350" cy="200" r="8" fill="#ffd700" stroke="#ffee88" stroke-width="1.5"/>
  <circle cx="347" cy="197" r="2" fill="#fff" fill-opacity="0.5"/>

  <!-- Force arrow from probe -->
  <line x1="350" y1="200" x2="390" y2="160" stroke="#f85149" stroke-width="2.5"/>
  <polygon points="390,160 385,168 393,165" fill="#f85149"/>

  <!-- Spring line -->
  <line x1="350" y1="200" x2="320" y2="250" stroke="#3fb950" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <circle cx="320" cy="250" r="3" fill="#3fb950"/>

  <!-- Overlay HUD -->
  <rect x="10" y="50" width="80" height="22" rx="4" fill="rgba(13,17,23,0.8)" stroke="#30363d" stroke-width="0.5"/>
  <text x="50" y="65" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="10">FPS: 60</text>

  <rect x="100" y="50" width="110" height="22" rx="4" fill="rgba(13,17,23,0.8)" stroke="#30363d" stroke-width="0.5"/>
  <text x="155" y="65" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="10">Collisions: 4</text>

  <rect x="220" y="50" width="120" height="22" rx="4" fill="rgba(13,17,23,0.8)" stroke="#30363d" stroke-width="0.5"/>
  <text x="280" y="65" text-anchor="middle" fill="#d29922" font-family="monospace" font-size="10">Force: 0.842 N</text>

  <!-- ===== Side Panel ===== -->
  <rect x="610" y="40" width="290" height="420" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- Connection -->
  <text x="625" y="65" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold" text-transform="uppercase" letter-spacing="1">CONNECTION</text>
  <rect x="625" y="72" width="260" height="22" rx="4" fill="rgba(63,185,80,0.15)" stroke="rgba(63,185,80,0.3)" stroke-width="1"/>
  <text x="755" y="87" text-anchor="middle" fill="#3fb950" font-family="Arial, sans-serif" font-size="10">Connected</text>

  <!-- Scene section -->
  <text x="625" y="112" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">SCENE</text>
  <rect x="625" y="118" width="125" height="24" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="687" y="134" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="10">Reset Scene</text>
  <rect x="760" y="118" width="125" height="24" rx="5" fill="#21262d" stroke="#30363d" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="822" y="134" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Load OBJ</text>

  <!-- Probe Position -->
  <text x="625" y="162" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">PROBE POSITION</text>
  <!-- X slider -->
  <text x="625" y="180" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">X</text>
  <rect x="645" y="172" width="180" height="4" rx="2" fill="#30363d"/>
  <rect x="645" y="172" width="110" height="4" rx="2" fill="#39d2c0"/>
  <circle cx="755" cy="174" r="5" fill="#39d2c0"/>
  <text x="845" y="180" fill="#39d2c0" font-family="monospace" font-size="9">0.50</text>

  <!-- Y slider -->
  <text x="625" y="198" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Y</text>
  <rect x="645" y="190" width="180" height="4" rx="2" fill="#30363d"/>
  <rect x="645" y="190" width="90" height="4" rx="2" fill="#39d2c0"/>
  <circle cx="735" cy="192" r="5" fill="#39d2c0"/>
  <text x="845" y="198" fill="#39d2c0" font-family="monospace" font-size="9">0.30</text>

  <!-- Z slider -->
  <text x="625" y="216" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Z</text>
  <rect x="645" y="208" width="180" height="4" rx="2" fill="#30363d"/>
  <rect x="645" y="208" width="140" height="4" rx="2" fill="#39d2c0"/>
  <circle cx="785" cy="210" r="5" fill="#39d2c0"/>
  <text x="845" y="216" fill="#39d2c0" font-family="monospace" font-size="9">1.00</text>

  <!-- Physics -->
  <text x="625" y="240" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">PHYSICS</text>
  <!-- Stiffness -->
  <text x="625" y="258" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Stiffness (k)</text>
  <rect x="710" y="250" width="115" height="4" rx="2" fill="#30363d"/>
  <rect x="710" y="250" width="25" height="4" rx="2" fill="#39d2c0"/>
  <text x="845" y="258" fill="#39d2c0" font-family="monospace" font-size="9">0.20</text>

  <!-- Damping -->
  <text x="625" y="276" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Damping (b)</text>
  <rect x="710" y="268" width="115" height="4" rx="2" fill="#30363d"/>
  <rect x="710" y="268" width="15" height="4" rx="2" fill="#39d2c0"/>
  <text x="845" y="276" fill="#39d2c0" font-family="monospace" font-size="9">0.05</text>

  <!-- Max Force -->
  <text x="625" y="294" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">Max Force</text>
  <rect x="710" y="286" width="115" height="4" rx="2" fill="#30363d"/>
  <rect x="710" y="286" width="45" height="4" rx="2" fill="#39d2c0"/>
  <text x="845" y="294" fill="#39d2c0" font-family="monospace" font-size="9">3.30</text>

  <!-- Display toggles -->
  <text x="625" y="318" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">DISPLAY</text>
  <!-- Checkboxes -->
  <rect x="625" y="325" width="12" height="12" rx="2" fill="#39d2c0" stroke="#39d2c0" stroke-width="1"/>
  <text x="628" y="335" fill="#000" font-family="Arial, sans-serif" font-size="10" font-weight="bold">&#10003;</text>
  <text x="645" y="336" fill="#e6edf3" font-family="Arial, sans-serif" font-size="10">Show Octree</text>

  <rect x="625" y="345" width="12" height="12" rx="2" fill="none" stroke="#30363d" stroke-width="1"/>
  <text x="645" y="356" fill="#e6edf3" font-family="Arial, sans-serif" font-size="10">Show AABB</text>

  <rect x="625" y="365" width="12" height="12" rx="2" fill="#39d2c0" stroke="#39d2c0" stroke-width="1"/>
  <text x="628" y="375" fill="#000" font-family="Arial, sans-serif" font-size="10" font-weight="bold">&#10003;</text>
  <text x="645" y="376" fill="#e6edf3" font-family="Arial, sans-serif" font-size="10">Show Force Arrow</text>

  <!-- Bodies info -->
  <text x="625" y="400" fill="#8b949e" font-family="Arial, sans-serif" font-size="10" font-weight="bold">BODIES</text>
  <rect x="625" y="406" width="260" height="18" rx="3" fill="#21262d"/>
  <text x="630" y="419" fill="#39d2c0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cube A</text>
  <text x="680" y="419" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">| V:8 F:12 C:2</text>

  <rect x="625" y="428" width="260" height="18" rx="3" fill="#21262d"/>
  <text x="630" y="441" fill="#39d2c0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Cube B</text>
  <text x="680" y="441" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">| V:8 F:12 C:2</text>

  <rect x="625" y="450" width="260" height="18" rx="3" fill="#21262d"/>
  <text x="630" y="463" fill="#39d2c0" font-family="Arial, sans-serif" font-size="9" font-weight="bold">Sphere</text>
  <text x="685" y="463" fill="#8b949e" font-family="Arial, sans-serif" font-size="9">| V:143 F:280 C:0</text>

  <!-- Caption -->
  <text x="450" y="490" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">UDEC Haptic SIM -- Application Visualization (mock screenshot)</text>
</svg>
