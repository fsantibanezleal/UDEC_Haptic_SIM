<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 400" width="850" height="400">
  <defs>
    <linearGradient id="bgG3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3fb950"/>
    </marker>
    <filter id="g3">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="850" height="400" fill="url(#bgG3)"/>

  <!-- Title -->
  <text x="425" y="30" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Collision Detection Pipeline</text>
  <text x="425" y="48" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="11">Three-phase pipeline: Broad Phase --> Octree Query --> Narrow Phase (SAT)</text>

  <!-- ===== Phase 1: Broad Phase ===== -->
  <rect x="30" y="70" width="210" height="130" rx="10" fill="#21262d" stroke="#f85149" stroke-width="2"/>
  <text x="135" y="95" text-anchor="middle" fill="#f85149" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Broad Phase</text>
  <text x="135" y="112" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">AABB Overlap Test</text>

  <!-- AABB illustration -->
  <rect x="60" y="122" width="50" height="40" rx="2" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <rect x="85" y="132" width="50" height="40" rx="2" fill="none" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Overlap region -->
  <rect x="85" y="132" width="25" height="30" fill="#f85149" fill-opacity="0.15"/>

  <text x="170" y="140" fill="#e6edf3" font-family="monospace" font-size="9">if AABB_A</text>
  <text x="170" y="153" fill="#e6edf3" font-family="monospace" font-size="9">overlaps</text>
  <text x="170" y="166" fill="#e6edf3" font-family="monospace" font-size="9">AABB_B</text>

  <text x="135" y="193" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="11" font-weight="bold">O(N)</text>

  <!-- Arrow 1 -->
  <line x1="240" y1="135" x2="300" y2="135" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arr3)" filter="url(#g3)"/>
  <text x="270" y="120" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="10" font-weight="bold">1000</text>
  <text x="270" y="155" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="8">pairs</text>

  <!-- ===== Phase 2: Octree Query ===== -->
  <rect x="305" y="70" width="210" height="130" rx="10" fill="#21262d" stroke="#d29922" stroke-width="2"/>
  <text x="410" y="95" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Octree Query</text>
  <text x="410" y="112" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Spatial Filtering</text>

  <!-- Mini octree -->
  <rect x="330" y="120" width="40" height="40" fill="none" stroke="#d29922" stroke-width="1"/>
  <line x1="330" y1="140" x2="370" y2="140" stroke="#d29922" stroke-width="0.8"/>
  <line x1="350" y1="120" x2="350" y2="160" stroke="#d29922" stroke-width="0.8"/>
  <!-- Highlighted cell -->
  <rect x="350" y="120" width="20" height="20" fill="#d29922" fill-opacity="0.2"/>

  <rect x="380" y="120" width="40" height="40" fill="none" stroke="#d29922" stroke-width="1"/>
  <line x1="380" y1="140" x2="420" y2="140" stroke="#d29922" stroke-width="0.8"/>
  <line x1="400" y1="120" x2="400" y2="160" stroke="#d29922" stroke-width="0.8"/>
  <rect x="380" y="140" width="20" height="20" fill="#d29922" fill-opacity="0.2"/>

  <text x="460" y="138" fill="#e6edf3" font-family="monospace" font-size="9">Only test</text>
  <text x="460" y="151" fill="#e6edf3" font-family="monospace" font-size="9">shared</text>
  <text x="460" y="164" fill="#e6edf3" font-family="monospace" font-size="9">leaf nodes</text>

  <text x="410" y="193" text-anchor="middle" fill="#d29922" font-family="monospace" font-size="11" font-weight="bold">O(N log N)</text>

  <!-- Arrow 2 -->
  <line x1="515" y1="135" x2="575" y2="135" stroke="#3fb950" stroke-width="2.5" marker-end="url(#arr3)" filter="url(#g3)"/>
  <text x="545" y="120" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="10" font-weight="bold">50</text>
  <text x="545" y="155" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="8">pairs</text>

  <!-- ===== Phase 3: Narrow Phase (SAT) ===== -->
  <rect x="580" y="70" width="240" height="130" rx="10" fill="#21262d" stroke="#39d2c0" stroke-width="2"/>
  <text x="700" y="95" text-anchor="middle" fill="#39d2c0" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Narrow Phase (SAT)</text>
  <text x="700" y="112" text-anchor="middle" fill="#8b949e" font-family="Arial, sans-serif" font-size="10">Triangle-Triangle Test</text>

  <!-- Two triangles with separating axis -->
  <polygon points="610,135 640,155 615,160" fill="#58a6ff" fill-opacity="0.3" stroke="#58a6ff" stroke-width="1.5"/>
  <polygon points="660,130 690,150 665,155" fill="#d29922" fill-opacity="0.3" stroke="#d29922" stroke-width="1.5"/>
  <!-- Separating axis -->
  <line x1="648" y1="118" x2="648" y2="170" stroke="#f85149" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="648" y="180" text-anchor="middle" fill="#f85149" font-family="Arial, sans-serif" font-size="8">sep. axis</text>

  <!-- Projections on axis -->
  <line x1="640" y1="168" x2="648" y2="168" stroke="#58a6ff" stroke-width="3"/>
  <line x1="652" y1="168" x2="660" y2="168" stroke="#d29922" stroke-width="3"/>
  <text x="650" y="166" text-anchor="middle" fill="#f85149" font-family="monospace" font-size="7">gap</text>

  <text x="750" y="138" fill="#e6edf3" font-family="monospace" font-size="9">11 axes:</text>
  <text x="750" y="151" fill="#e6edf3" font-family="monospace" font-size="9">2 normals</text>
  <text x="750" y="164" fill="#e6edf3" font-family="monospace" font-size="9">9 edge x</text>

  <text x="700" y="193" text-anchor="middle" fill="#39d2c0" font-family="monospace" font-size="11" font-weight="bold">O(k) per pair</text>

  <!-- Result -->
  <rect x="700" y="215" width="120" height="30" rx="6" fill="#3fb950" fill-opacity="0.15" stroke="#3fb950" stroke-width="1.5"/>
  <text x="760" y="234" text-anchor="middle" fill="#3fb950" font-family="monospace" font-size="12" font-weight="bold">3 collisions</text>
  <line x1="700" y1="200" x2="730" y2="215" stroke="#3fb950" stroke-width="1.5"/>

  <!-- ===== SAT Detail Section ===== -->
  <text x="425" y="270" text-anchor="middle" fill="#e6edf3" font-family="Arial, sans-serif" font-size="14" font-weight="bold">Separating Axis Theorem (SAT) Detail</text>

  <!-- SAT Diagram -->
  <rect x="30" y="285" width="370" height="100" rx="8" fill="#21262d" stroke="#39d2c0" stroke-width="1"/>

  <!-- Triangle A -->
  <polygon points="60,320 130,300 100,365" fill="#58a6ff" fill-opacity="0.25" stroke="#58a6ff" stroke-width="2"/>
  <text x="95" y="350" text-anchor="middle" fill="#58a6ff" font-family="Arial, sans-serif" font-size="10" font-weight="bold">A</text>

  <!-- Triangle B -->
  <polygon points="150,310 220,295 190,370" fill="#d29922" fill-opacity="0.25" stroke="#d29922" stroke-width="2"/>
  <text x="185" y="348" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="10" font-weight="bold">B</text>

  <!-- Normal arrows -->
  <line x1="95" y1="330" x2="75" y2="290" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="65" y="288" fill="#58a6ff" font-family="Arial, sans-serif" font-size="8">n_A</text>
  <line x1="185" y1="330" x2="165" y2="290" stroke="#d29922" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="155" y="288" fill="#d29922" font-family="Arial, sans-serif" font-size="8">n_B</text>

  <!-- Explanation -->
  <text x="260" y="308" fill="#e6edf3" font-family="monospace" font-size="9">Candidate axes:</text>
  <text x="260" y="324" fill="#39d2c0" font-family="monospace" font-size="9">- n_A (face normal of A)</text>
  <text x="260" y="340" fill="#39d2c0" font-family="monospace" font-size="9">- n_B (face normal of B)</text>
  <text x="260" y="356" fill="#39d2c0" font-family="monospace" font-size="9">- e_Ai x e_Bj  (9 pairs)</text>
  <text x="260" y="372" fill="#8b949e" font-family="monospace" font-size="9">Total: 11 axis tests</text>

  <!-- SAT Rule -->
  <rect x="430" y="285" width="390" height="100" rx="8" fill="#21262d" stroke="#d29922" stroke-width="1"/>
  <text x="625" y="308" text-anchor="middle" fill="#d29922" font-family="Arial, sans-serif" font-size="12" font-weight="bold">SAT Decision Rule</text>

  <text x="450" y="330" fill="#3fb950" font-family="monospace" font-size="10">if max(proj_A) &lt; min(proj_B):</text>
  <text x="470" y="346" fill="#3fb950" font-family="monospace" font-size="10">return NO_COLLISION  # separated!</text>
  <text x="450" y="366" fill="#f85149" font-family="monospace" font-size="10">if no axis separates them:</text>
  <text x="470" y="382" fill="#f85149" font-family="monospace" font-size="10">return COLLISION  # intersecting!</text>
</svg>
